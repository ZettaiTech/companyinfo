<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="secGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <rect width="300" height="200" fill="url(#secGrad)"/>
  
  <!-- Câmeras de vigilância -->
  <!-- Câmera 1 (topo-esquerda) -->
  <circle cx="70" cy="60" r="12" fill="none" stroke="#c0a962" stroke-width="2" opacity="0.8"/>
  <circle cx="70" cy="60" r="6" fill="none" stroke="#c0a962" stroke-width="1" opacity="0.6"/>
  <line x1="65" y1="50" x2="65" y2="45" stroke="#c0a962" stroke-width="2" opacity="0.5"/>
  
  <!-- Câmera 2 (topo-direita) -->
  <circle cx="230" cy="60" r="12" fill="none" stroke="#00d9ff" stroke-width="2" opacity="0.8"/>
  <circle cx="230" cy="60" r="6" fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.6"/>
  <line x1="235" y1="50" x2="235" y2="45" stroke="#00d9ff" stroke-width="2" opacity="0.5"/>
  
  <!-- Câmera 3 (baixo-centro) -->
  <circle cx="150" cy="140" r="12" fill="none" stroke="#c0a962" stroke-width="2" opacity="0.8"/>
  <circle cx="150" cy="140" r="6" fill="none" stroke="#c0a962" stroke-width="1" opacity="0.6"/>
  <line x1="150" y1="152" x2="150" y2="160" stroke="#c0a962" stroke-width="2" opacity="0.5"/>
  
  <!-- Centro de monitoramento -->
  <rect x="110" y="85" width="80" height="35" rx="4" fill="none" stroke="#00d9ff" stroke-width="2" opacity="0.7"/>
  <line x1="125" y1="95" x2="185" y2="95" stroke="#00d9ff" stroke-width="1" opacity="0.5"/>
  <line x1="125" y1="105" x2="185" y2="105" stroke="#00d9ff" stroke-width="1" opacity="0.5"/>
  <line x1="125" y1="115" x2="185" y2="115" stroke="#00d9ff" stroke-width="1" opacity="0.5"/>
  
  <!-- Linhas de conexão -->
  <line x1="70" y1="70" x2="130" y2="85" stroke="#c0a962" stroke-width="1.5" opacity="0.5"/>
  <line x1="230" y1="70" x2="170" y2="85" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="128" x2="150" y2="120" stroke="#c0a962" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Ícone de unlock (segurança ativa) -->
  <circle cx="260" cy="140" r="10" fill="none" stroke="#c0a962" stroke-width="1.5" opacity="0.7"/>
  <path d="M 260 135 L 260 145" stroke="#c0a962" stroke-width="1" opacity="0.7"/>
</svg>