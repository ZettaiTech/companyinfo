<svg viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="securityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <rect width="300" height="250" fill="url(#securityGrad)"/>
  
  <!-- Escudo principal -->
  <path d="M 150 50 L 210 80 L 210 140 Q 150 180, 150 180 Q 150 180, 90 140 L 90 80 Z" fill="none" stroke="#00d9ff" stroke-width="3" opacity="0.8"/>
  
  <!-- Cadeado dentro do escudo -->
  <rect x="130" y="110" width="40" height="35" rx="4" fill="none" stroke="#c0a962" stroke-width="2" opacity="0.8"/>
  <circle cx="150" cy="128" r="4" fill="none" stroke="#c0a962" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Arco da fechadura -->
  <path d="M 135 110 Q 135 95, 150 95 Q 165 95, 165 110" fill="none" stroke="#c0a962" stroke-width="2" opacity="0.6"/>
  
  <!-- Checkmark de segurança -->
  <path d="M 190 120 L 195 130 L 210 115" fill="none" stroke="#00d9ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  
  <!-- Linhas de proteção -->
  <line x1="100" y1="160" x2="200" y2="160" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
  <line x1="95" y1="175" x2="205" y2="175" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
</svg>