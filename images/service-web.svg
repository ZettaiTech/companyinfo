<svg viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="webGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <rect width="300" height="250" fill="url(#webGrad)"/>
  
  <!-- Laptop/Tela -->
  <rect x="60" y="40" width="180" height="120" rx="5" fill="none" stroke="#00d9ff" stroke-width="3"/>
  <rect x="70" y="50" width="160" height="100" fill="#0099cc" opacity="0.1"/>
  
  <!-- Conteúdo da tela -->
  <line x1="80" y1="65" x2="220" y2="65" stroke="#00d9ff" stroke-width="2" opacity="0.7"/>
  <line x1="80" y1="80" x2="180" y2="80" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="95" x2="220" y2="95" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="110" x2="200" y2="110" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="125" x2="180" y2="125" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Base do laptop -->
  <rect x="70" y="160" width="160" height="5" rx="2" fill="#00d9ff" opacity="0.6"/>
  <rect x="40" y="165" width="220" height="4" rx="2" fill="#00d9ff" opacity="0.3"/>
  
  <!-- Código brilhando -->
  <circle cx="280" cy="60" r="8" fill="#00d9ff" opacity="0.8"/>
  <circle cx="280" cy="60" r="12" fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.4"/>
</svg>