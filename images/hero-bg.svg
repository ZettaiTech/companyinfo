<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo gradiente -->
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#c0a962;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#heroBg)"/>
  
  <!-- Círculos decorativos -->
  <circle cx="100" cy="80" r="50" fill="none" stroke="#00d9ff" stroke-width="2" opacity="0.6"/>
  <circle cx="100" cy="80" r="40" fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
  
  <circle cx="300" cy="220" r="60" fill="none" stroke="#c0a962" stroke-width="2" opacity="0.6"/>
  <circle cx="300" cy="220" r="45" fill="none" stroke="#c0a962" stroke-width="1" opacity="0.3"/>
  
  <!-- Linhas de conexão (representando dados/conexão) -->
  <line x1="80" y1="150" x2="200" y2="180" stroke="#00d9ff" stroke-width="2" opacity="0.5"/>
  <line x1="300" y1="100" x2="200" y2="180" stroke="#c0a962" stroke-width="2" opacity="0.5"/>
  <line x1="150" y1="50" x2="200" y2="180" stroke="#00d9ff" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Ponto central (tecnologia/inovação) -->
  <circle cx="200" cy="180" r="8" fill="#00d9ff"/>
  <circle cx="200" cy="180" r="15" fill="none" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
</svg>