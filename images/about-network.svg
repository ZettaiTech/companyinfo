<svg viewBox="0 0 400 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="networkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#c0a962;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  <rect width="400" height="350" fill="url(#networkGrad)"/>
  
  <!-- Nós de rede em hexágono -->
  <!-- Centro -->
  <circle cx="200" cy="175" r="12" fill="#00d9ff" opacity="0.9"/>
  <circle cx="200" cy="175" r="20" fill="none" stroke="#00d9ff" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Nós periféricos -->
  <!-- Topo -->
  <circle cx="200" cy="60" r="10" fill="#c0a962" opacity="0.8"/>
  <line x1="200" y1="175" x2="200" y2="60" stroke="#00d9ff" stroke-width="2" opacity="0.5"/>
  
  <!-- Topo-direita -->
  <circle cx="310" cy="100" r="10" fill="#c0a962" opacity="0.8"/>
  <line x1="200" y1="175" x2="310" y2="100" stroke="#00d9ff" stroke-width="2" opacity="0.5"/>
  
  <!-- Direita -->
  <circle cx="340" cy="175" r="10" fill="#00d9ff" opacity="0.8"/>
  <line x1="200" y1="175" x2="340" y2="175" stroke="#00d9ff" stroke-width="2" opacity="0.5"/>
  
  <!-- Direita-baixo -->
  <circle cx="310" cy="250" r="10" fill="#c0a962" opacity="0.8"/>
  <line x1="200" y1="175" x2="310" y2="250" stroke="#00d9ff" stroke-width="2" opacity="0.5"/>
  
  <!-- Baixo -->
  <circle cx="200" cy="290" r="10" fill="#c0a962" opacity="0.8"/>
  <line x1="200" y1="175" x2="200" y2="290" stroke="#00d9ff" stroke-width="2" opacity="0.5"/>
  
  <!-- Esquerda-baixo -->
  <circle cx="90" cy="250" r="10" fill="#00d9ff" opacity="0.8"/>
  <line x1="200" y1="175" x2="90" y2="250" stroke="#00d9ff" stroke-width="2" opacity="0.5"/>
  
  <!-- Esquerda -->
  <circle cx="60" cy="175" r="10" fill="#c0a962" opacity="0.8"/>
  <line x1="200" y1="175" x2="60" y2="175" stroke="#00d9ff" stroke-width="2" opacity="0.5"/>
  
  <!-- Esquerda-topo -->
  <circle cx="90" cy="100" r="10" fill="#00d9ff" opacity="0.8"/>
  <line x1="200" y1="175" x2="90" y2="100" stroke="#00d9ff" stroke-width="2" opacity="0.5"/>
  
  <!-- Conexões entre nós periféricos -->
  <line x1="200" y1="60" x2="310" y2="100" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
  <line x1="310" y1="100" x2="340" y2="175" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
  <line x1="90" y1="100" x2="60" y2="175" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
  
  <!-- Pulsos (indicando atividade) -->
  <circle cx="200" cy="175" r="28" fill="none" stroke="#00d9ff" stroke-width="0.5" opacity="0.2">
    <animate attributeName="r" from="28" to="45" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.3" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>