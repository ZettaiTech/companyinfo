<svg viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <rect width="300" height="250" fill="url(#aiGrad)"/>
  
  <!-- Cérebro (representando IA) -->
  <circle cx="150" cy="110" r="35" fill="none" stroke="#00d9ff" stroke-width="2.5" opacity="0.8"/>
  
  <!-- Circuitos neurais -->
  <path d="M 115 80 Q 130 70, 150 75" fill="none" stroke="#c0a962" stroke-width="2" opacity="0.6"/>
  <path d="M 185 80 Q 170 70, 150 75" fill="none" stroke="#c0a962" stroke-width="2" opacity="0.6"/>
  <path d="M 120 140 Q 135 155, 150 150" fill="none" stroke="#c0a962" stroke-width="2" opacity="0.6"/>
  <path d="M 180 140 Q 165 155, 150 150" fill="none" stroke="#c0a962" stroke-width="2" opacity="0.6"/>
  
  <!-- Conexões (rede neural) -->
  <line x1="150" y1="75" x2="145" y2="55" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="75" x2="175" y2="60" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="150" x2="150" y2="180" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="150" x2="120" y2="170" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="150" x2="180" y2="170" stroke="#00d9ff" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Pontos de rede -->
  <circle cx="145" cy="55" r="2.5" fill="#00d9ff" opacity="0.8"/>
  <circle cx="175" cy="60" r="2.5" fill="#c0a962" opacity="0.8"/>
  <circle cx="150" cy="180" r="2.5" fill="#00d9ff" opacity="0.8"/>
  <circle cx="120" cy="170" r="2.5" fill="#c0a962" opacity="0.8"/>
  <circle cx="180" cy="170" r="2.5" fill="#00d9ff" opacity="0.8"/>
</svg>